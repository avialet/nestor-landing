name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy nestor-landing to Hostinger VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/nestor-landing
            git pull origin main
            npm ci
            npm run build
            echo "✅ nestor-landing déployé avec succès"
